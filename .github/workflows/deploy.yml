name: Deploy Portal

# Publica o site estático no S3 e invalida o cache do CloudFront.
# Dispara a cada push na main ou manualmente pela aba Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita deploys concorrentes; um novo push cancela o anterior em andamento.
concurrency:
  group: deploy-portal
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configura credenciais AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Sincroniza os arquivos versionáveis do site. Assets com cache longo
      # (podem ter hash/serem imutáveis); HTML sem cache para refletir deploys.
      - name: Sync assets (cache longo)
        run: |
          aws s3 sync . s3://greencap-k8s-portal \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".claude/*" \
            --exclude "scripts/*" \
            --exclude ".gitignore" \
            --exclude ".editorconfig" \
            --exclude ".prettierrc" \
            --exclude "README.md" \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync HTML (sem cache)
        run: |
          aws s3 sync . s3://greencap-k8s-portal \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalida cache do CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ECVMS62AD76FU \
            --paths "/*"
